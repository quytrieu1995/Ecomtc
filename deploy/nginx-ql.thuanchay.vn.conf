# Site: ql.thuanchay.vn → Next.js (standalone) trên 127.0.0.1:3000
#
# Cài đặt trên VPS:
#   sudo cp .../deploy/nginx-ql.thuanchay.vn.conf /etc/nginx/sites-available/ql.thuanchay.vn
#   sudo ln -sf /etc/nginx/sites-available/ql.thuanchay.vn /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS: sudo certbot --nginx -d ql.thuanchay.vn

upstream ecomtc_wms {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name ql.thuanchay.vn;

    location / {
        proxy_pass http://ecomtc_wms;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
