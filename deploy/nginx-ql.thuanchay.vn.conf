# Đặt vào: /etc/nginx/sites-available/ql.thuanchay.vn
# sudo ln -sf /etc/nginx/sites-available/ql.thuanchay.vn /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Trước khi bật SSL: chỉ dùng server listen 80.
# Sau certbot: certbot --nginx -d ql.thuanchay.vn

upstream ecomtc_wms {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    server_name ql.thuanchay.vn;

    location / {
        proxy_pass http://ecomtc_wms;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    listen 80;
    # Sau khi chạy certbot, các khối listen 443 ssl sẽ được thêm tự động.
}
